version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: taskflow-mongo
    ports:
      - "27017:27017"
    command: ["mongod", "--quiet", "--setParameter", "logComponentVerbosity={network:{verbosity:-1}}"]
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: taskflow

  redis:
    image: redis:alpine
    container_name: taskflow-redis
    ports:
      - "6379:6379"
    command: redis-server --save 20 1 --loglevel warning --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data: