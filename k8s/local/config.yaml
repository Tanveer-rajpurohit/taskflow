apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGO_URI: "mongodb://mongo:27017/taskflow"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  FRONTEND_URL: "http://localhost"
  NEXT_PUBLIC_API_URL: "/api"
  RATE_LIMIT_POINTS: "2000"
  RATE_LIMIT_DURATION: "60"
  RATE_LIMIT_BURST: "100"
