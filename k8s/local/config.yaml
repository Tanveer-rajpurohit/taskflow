apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow
data:
  NODE_ENV: "production"
  PORT: "5000"
  MONGO_URI: "mongodb://mongo:27017/taskflow"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  # In Kubernetes local, the frontend talks to the ingress gateway or backend service
  FRONTEND_URL: "http://localhost"
  RATE_LIMIT_POINTS: "500"
  RATE_LIMIT_DURATION: "60"
